# sbx-template-pi — Generic Pi coding agent kit
#
# Works with any OpenAI-compatible provider: Anthropic, OpenAI, DeepSeek,
# Kimi, Mistral, and more.  Pi is installed at sandbox creation via npm.
#
# Usage:
#   sbx run --kit ./sbx-kit/ pi
#   sbx run --kit "git+https://github.com/shaftoe/sbx-template-pi.git#dir=sbx-kit" pi
#
# Prerequisites — set at least one provider key on your host:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   sbx secret set ANTHROPIC_API_KEY=sk-ant-...

schemaVersion: "1"
kind: agent
name: sbx-template-pi
displayName: Pi (generic)
description: >
  Pi coding agent with multi-provider support.
  Installs pi via npm at sandbox creation.
  Works with Anthropic, OpenAI, DeepSeek, Kimi, Mistral, and others.

# ---------------------------------------------------------------------------
# Image — pre-built Pi image from GitHub Container Registry
# ---------------------------------------------------------------------------
agent:
  image: ghcr.io/shaftoe/sbx-template-pi:latest
  aiFilename: AGENTS.md
  entrypoint:
    run: [pi]

# ---------------------------------------------------------------------------
# Network — allow common LLM provider APIs and npm registry
# ---------------------------------------------------------------------------
network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    api.openai.com: openai
    api.deepseek.com: deepseek
    api.mistral.ai: mistral
    api.moonshot.cn: kimi
    api.z.ai: zai
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
    openai:
      headerName: Authorization
      valueFormat: "Bearer %s"
    deepseek:
      headerName: Authorization
      valueFormat: "Bearer %s"
    mistral:
      headerName: Authorization
      valueFormat: "Bearer %s"
    kimi:
      headerName: Authorization
      valueFormat: "Bearer %s"
    zai:
      headerName: Authorization
      valueFormat: "Bearer %s"
  allowedDomains:
    - registry.npmjs.org            # npm install
    - api.anthropic.com:443         # Anthropic
    - console.anthropic.com:443
    - api.openai.com:443            # OpenAI
    - api.deepseek.com:443          # DeepSeek
    - api.mistral.ai:443            # Mistral
    - api.moonshot.cn:443           # Kimi (Moonshot)
    - api.z.ai:443                  # Z.ai
    - github.com:443                # git-based extensions
    - api.github.com:443            # gh CLI
    - pi.dev:443                    # Pi.dev
    - "*.pi.dev:443"

# ---------------------------------------------------------------------------
# Credentials — read provider keys from host environment
# ---------------------------------------------------------------------------
credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY
    openai:
      env:
        - OPENAI_API_KEY
    deepseek:
      env:
        - DEEPSEEK_API_KEY
    mistral:
      env:
        - MISTRAL_API_KEY
    kimi:
      env:
        - MOONSHOT_API_KEY
    zai:
      env:
        - ZAI_API_KEY

# ---------------------------------------------------------------------------
# Environment — provider keys are proxy-managed inside the sandbox.
# The proxy intercepts outbound requests and replaces the sentinel value
# with the real credential in the appropriate header.
# ---------------------------------------------------------------------------
environment:
  proxyManaged:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - DEEPSEEK_API_KEY
    - MISTRAL_API_KEY
    - MOONSHOT_API_KEY
    - ZAI_API_KEY

# ---------------------------------------------------------------------------
# Commands — none needed; everything is baked into the image.
# ---------------------------------------------------------------------------
# Memory — brief sandbox orientation for the agent
# ---------------------------------------------------------------------------
memory: |
  ## Sandbox environment
  You are running inside a Docker sandbox (microVM). The workspace is mounted
  at its absolute host path. `sudo` is passwordless; use it for package installs.
  Docker is available inside the sandbox; containers you start are isolated in
  the microVM.

  If you need to install additional tools, use `apt-get`, `npm`, `pip`, or
  download binaries as needed.
