# pi-extras mixin — Shared skills, config, and quality-of-life for any Pi kit
#
# This is a **mixin** kit — it stacks on top of an agent kit (pi or pi-zai)
# to add shared workspace files, skills, and a custom AGENTS.md supplement.
#
# Usage:
#   sbx run --kit ./sbx-kit/ --kit ./sbx-kits/pi-extras/ pi
#   sbx run --kit ./sbx-kits/pi-zai/ --kit ./sbx-kits/pi-extras/ pi-zai
#
# From GitHub:
#   sbx run \
#     --kit "git+https://github.com/shaftoe/sbx-template-pi.git#dir=sbx-kits/pi-zai" \
#     --kit "git+https://github.com/shaftoe/sbx-template-pi.git#dir=sbx-kits/pi-extras" \
#     pi

schemaVersion: "1"
kind: mixin
name: pi-extras
displayName: Pi extras (mixin)
description: >
  Stacks on any Pi agent kit.  Adds shared skills, workspace configs,
  and git safety settings for the sandbox environment.

# ---------------------------------------------------------------------------
# Credentials — read GITHUB_TOKEN from host environment
# ---------------------------------------------------------------------------
credentials:
  sources:
    github:
      env:
        - GITHUB_TOKEN

# ---------------------------------------------------------------------------
# Environment — GITHUB_TOKEN is proxy-managed inside the sandbox.
# ---------------------------------------------------------------------------
environment:
  proxyManaged:
    - GITHUB_TOKEN

# ---------------------------------------------------------------------------
# Network — additional domains this mixin needs
# ---------------------------------------------------------------------------
# (none — inherits from the agent kit)

# ---------------------------------------------------------------------------
# Commands — install pi-shared skills and extensions
# ---------------------------------------------------------------------------
commands:
  install:
    - command: "pi install git:github.com/shaftoe/pi-shared"
      user: "1000"
      description: "Install pi-shared package if not already present"
    - command: "pi install npm:@alexanderfortin/pi-loaded-tools"
      user: "1000"
      description: "Install pi-loaded-tools extension if not already present"

  startup:
    - command: ["sh", "-c", 'git config --global user.email "agent@pi.dev" 2>/dev/null; git config --global user.name "Pi Agent" 2>/dev/null']
      user: "1000"
      description: "Set default git identity for the agent user"

# ---------------------------------------------------------------------------
# Memory — appended to the agent's memory file
# ---------------------------------------------------------------------------
memory: |
  ## Pi extras mixin
  - Git identity is set to `Pi Agent <agent@pi.dev>` by default.
