# pi-extras mixin — Shared skills, config, and quality-of-life for any Pi kit
#
# This is a **mixin** kit — it stacks on top of an agent kit (pi or pi-zai)
# to add shared workspace files, skills, and a custom AGENTS.md supplement.
#
# Usage:
#   sbx run --kit ./sbx-kit/ --kit ./sbx-kits/pi-extras/ pi
#   sbx run --kit ./sbx-kits/pi-zai/ --kit ./sbx-kits/pi-extras/ pi-zai
#
# From GitHub:
#   sbx run \
#     --kit "git+https://github.com/shaftoe/sbx-template-pi.git#dir=sbx-kit" \
#     --kit "git+https://github.com/shaftoe/sbx-template-pi.git#dir=sbx-kits/pi-extras" \
#     pi

schemaVersion: "1"
kind: mixin
name: pi-extras
displayName: Pi extras (mixin)
description: >
  Stacks on any Pi agent kit.  Adds shared skills, workspace configs,
  and git safety settings for the sandbox environment.

# ---------------------------------------------------------------------------
# Network — additional domains this mixin needs
# ---------------------------------------------------------------------------
# (none — inherits from the agent kit)

# ---------------------------------------------------------------------------
# Commands — install fd-find if not already present (idempotent)
# ---------------------------------------------------------------------------
commands:
  install:
    - command: >
        command -v fd >/dev/null 2>&1 || {
          apt-get update &&
          apt-get install -y fd-find &&
          ln -sf /usr/bin/fdfind /usr/local/bin/fd;
        }
      description: "Install fd-find (fast find) if not already present"
    - command: >
        command -v gh >/dev/null 2>&1 || {
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg |
            dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg &&
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg &&
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" |
            tee /etc/apt/sources.list.d/github-cli.list > /dev/null &&
          apt-get update &&
          apt-get install -y gh;
        }
      description: "Install GitHub CLI (gh) if not already present"
  startup:
    - command: ["sh", "-c", 'git config --global user.email "agent@pi.dev" 2>/dev/null; git config --global user.name "Pi Agent" 2>/dev/null']
      user: "1000"
      description: "Set default git identity for the agent user"

# ---------------------------------------------------------------------------
# Memory — appended to the agent's memory file
# ---------------------------------------------------------------------------
memory: |
  ## Pi extras mixin
  - `fd` is available for fast file finding.
  - `gh` (GitHub CLI) is available for GitHub operations.
  - Git identity is set to `Pi Agent <agent@pi.dev>` by default.
  - Use `GIT_CONFIG_NOSYSTEM=1` and `GIT_CONFIG_GLOBAL=/dev/null` in
    sandboxes to avoid issues with read-only git config.
